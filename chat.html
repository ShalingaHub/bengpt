<html lang="en">
<head>

  <title>Ben GPT • New Cheeeat</title>
  <style>

      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #060a14;
      color: #eef2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #07101f 0%, #070b17 100%);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 18px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }

    .topbar a {
      color: #8fb7ff;
      text-decoration: none;
      font-weight: 600;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px;
    }

    .chat-window {
      display: grid;
      gap: 18px;
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .message-list {
      display: grid;
      gap: 14px;
      max-height: 62vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .message {
      max-width: 86%;
      padding: 20px 22px;
      border-radius: 24px;
      line-height: 1.7;
      font-size: 0.98rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    .message.user {
      justify-self: end;
      background: linear-gradient(135deg, rgba(79, 155, 255, 0.2), rgba(14, 212, 199, 0.12));
      color: #eaf6ff;
    }

    .message.bot {
      justify-self: start;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dbe3ff;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      color: #eef2ff;
      padding: 18px 20px;
      resize: vertical;
      font: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: rgba(79, 155, 255, 0.7);
      box-shadow: 0 0 0 4px rgba(79, 155, 255, 0.12);
    }

    .send-button {
      border: 0;
      border-radius: 20px;
      background: linear-gradient(135deg, #4f9bff, #0ed4c7);
      color: #070b17;
      padding: 0 28px;
      font-weight: 700;
      cursor: pointer;
      min-width: 140px;
    }

    .meta {
      display: grid;
      gap: 6px;
      color: #8c9cda;
      font-size: 0.95rem;
    }

    .meta strong {
      color: #f8fbff;
    }

    .site-header {
      display: flex;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(6, 10, 20, 0.92);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
    }

    .header-inner {
      width: min(1080px, 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      gap: 18px;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: #dbe3ff;
      text-decoration: none;
      font-weight: 600;
      transition: color 180ms ease;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: #4f9bff;
    }

    .site-footer {
      margin-top: 24px;
      color: #7d88b7;
      font-size: 0.95rem;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .try-ask {
      display: grid;
      gap: 10px;
      padding: 18px 0 8px;
      color: #c5d0ff;
    }

    .try-ask p {
      margin: 0;
      font-size: 0.95rem;
      color: #a8b7ff;
      letter-spacing: 0.01em;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .suggestion-button {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #eef2ff;
      padding: 10px 14px;
      border-radius: 16px;
      cursor: pointer;
      font: inherit;
      transition: background 180ms ease, transform 180ms ease;
    }

    .suggestion-button:hover,
    .suggestion-button:focus-visible {
      background: rgba(79, 155, 255, 0.16);
      transform: translateY(-1px);
    }

    .crazy-control {
      display: grid;
      gap: 10px;
      padding: 18px 0 8px;
      color: #c5d0ff;
    }

    .crazy-control label {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 0.95rem;
      color: #a8b7ff;
    }

    .crazy-slider {
      width: 100%;
      appearance: none;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      outline: none;
    }

    .crazy-slider::-webkit-slider-thumb {
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f9bff, #0ed4c7);
      box-shadow: 0 0 10px rgba(79,155,255,0.35);
      cursor: pointer;
      border: none;
    }

    .crazy-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f9bff, #0ed4c7);
      border: none;
      cursor: pointer;
    }

    .glitch-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0;
      z-index: 9999;
      background: repeating-linear-gradient(
        180deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      animation: glitchFade 0.2s ease-in-out infinite;
    }

    .corner-video {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 220px;
      max-width: 40vw;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
      z-index: 10000;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.25);
    }

    @media (max-width: 640px) {
      .topbar,
      .container { padding-left: 18px; padding-right: 18px; }
      .input-row { grid-template-columns: 1fr; }
      .send-button { width: 100%; min-width: 0; }
      .message { max-width: 100%; }
      .suggestion-button { flex: 1 1 100%; }
      .corner-video {
        left: 12px;
        bottom: 12px;
        width: 46vw;
      }
    }

    .glitching .glitch-layer {
      opacity: 0.65;
      animation: glitchMove 0.08s steps(2) infinite;
    }

    body.glitching,
    body.glitching .topbar,
    body.glitching .chat-window,
    body.glitching .message {
      animation: shake 0.12s ease-in-out infinite;
    }

    body.glitching .message.bot {
      color: #ff9bff;
      border-color: rgba(255, 155, 255, 0.4);
      box-shadow: 0 0 40px rgba(255, 155, 255, 0.25);
    }

    body.glitching .topbar,
    body.glitching .chat-window {
      filter: hue-rotate(15deg) contrast(1.1);
    }

    @keyframes glitchFade {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.75; }
    }

    @keyframes glitchMove {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-3px, 1px); }
      80% { transform: translate(1px, 3px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-1px, 1px); }
      40% { transform: translate(1px, -1px); }
      60% { transform: translate(-1px, -1px); }
      80% { transform: translate(1px, 1px); }
    }

    @media (max-width: 640px) {
      .topbar,
      .container { padding-left: 18px; padding-right: 18px; }
      .input-row { grid-template-columns: 1fr; }
      .send-button { width: 100%; min-width: 0; }
      .message { max-width: 100%; }
      .suggestion-button { flex: 1 1 100%; }
    }
  </style>
</head>

      const { nouns, verbs, adjectives, adverbs, connectors } = coherentWords;

        const connector = getRandom(connectors);
        const targetNoun = getRandom(nouns.filter(n => n !== noun));
        const targetAdjective = getRandom(adjectives);

        const templates = [

          `${adjective.charAt(0).toUpperCase() + adjective.slice(1)} observation about ${noun}! I'd say we should ${verb} this ${adverb}. ${targetNoun} becomes ${targetAdjective} when we explore it further.`
        ];
        sentences.push(getRandom(templates));
      }

      return sentences.join(' ');

    function buildLongReply(themeWords, crazy = 0.5) {
      const maxExtra = Math.round(crazy * 8);
      const count = 5 + Math.floor(Math.random() * 4) + maxExtra;
      const phrases = [];

        const first = getRandom(themeWords);
        const second = getRandom(wildWords.filter(w => w !== first));
        const connector = getRandom(extras);
        phrases.push(`${first} ${connector} ${second}`);
      }
      const trailing = crazy > 0.6 ? ` AHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHH!` : '';
      return phrases.join(', ') + `.${trailing}`;
    }

    function getBotReply(userText) {
      const crazy = Number(crazinessSlider.value) / 100;
      const lower = userText.toLowerCase();
      const foundKeywords = wildWords.filter(word => lower.includes(word.toLowerCase()));
      const isSpam = Math.random() < 0.2;

      if (isSpam) {
        const scream = crazy > 0.5 ? 'AHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHH!' : '';
        return {
          text: `${scream} ${Array.from({ length: 50 }, () => 'fuck you').join(' ')}`,
          spam: true,
          crazy
        };
      }

      if (crazy <= 0.1) {
        return {
          text: buildCoherentReply(userText, crazy),
          spam: false,
          crazy
        };
      }

      let templateSet = reactionTemplates.generic;
      if (/\b(what|how|why|when|where|who|does|is|can)\b/.test(lower)) {
        templateSet = reactionTemplates.question;
      } else if (foundKeywords.length > 0) {
        templateSet = reactionTemplates.mention;
      }

      const firstWord = foundKeywords[0] || getRandom(wildWords);
      const secondWord = foundKeywords[1] || getRandom(wildWords.filter(w => w !== firstWord));
      const template = getRandom(templateSet);
      const reply = template.replace('%s', firstWord).replace('%s', secondWord);
      const longExtra = buildLongReply([firstWord, secondWord], crazy);
      const scream = crazy > 0.6 ? 'AHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHH!' : '';
      return {
        text: `${scream} hehe okay tiny brain says: ${reply} ${longExtra}`,
        spam: false,
        crazy
      };
    }

    function appendMessage(text, role) {
      const message = document.createElement('article');
      message.className = 'message ' + role;
      message.textContent = text;
      messageList.appendChild(message);
      messageList.scrollTop = messageList.scrollHeight;
      return message;
    }

    function typeReply(messageElement, text, speed = 18) {
      let index = 0;
      messageElement.textContent = '';
      const interval = setInterval(() => {
        messageElement.textContent += text[index] || '';
        index += 1;
        messageList.scrollTop = messageList.scrollHeight;
        if (index >= text.length) {
          clearInterval(interval);
        }
      }, speed);
    }

    function setGlitching(state) {
      if (state) {
        document.body.classList.add('glitching');
      } else {
        document.body.classList.remove('glitching');
      }
    }

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      appendMessage(text, 'user');
      chatInput.value = '';
      const typingBubble = appendMessage('Ben GPT is typing...', 'bot');
      const reply = getBotReply(text);
      const typeSpeed = reply.spam ? Math.max(2, 10 - reply.crazy * 6) : Math.max(6, 20 - reply.crazy * 12);

      if (reply.spam) {
        setGlitching(true);
        typingBubble.textContent = 'Ben GPT is yapping super loud...';
      }

      setTimeout(() => {
        typeReply(typingBubble, reply.text, typeSpeed);
        if (reply.spam) {
          const glitchDuration = 6200 + (reply.crazy || 0.5) * 3200;
          setTimeout(() => setGlitching(false), glitchDuration);
        }
      }, 700);
    }

    sendButton.addEventListener('click', sendMessage);
    suggestionButtons.forEach(button => {
      button.addEventListener('click', () => {
        chatInput.value = button.textContent;
        chatInput.focus();
      });
    });
    chatInput.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>
